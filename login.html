<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FixCar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #001F3F; color: white;">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card bg-dark text-white p-4">

                    <h2 class="text-center mb-4">Iniciar Sesión</h2>

                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" id="correo" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control">
                    </div>

                    <button class="btn btn-primary w-100" onclick="login()">
                        Ingresar
                    </button>

                    <div class="text-center mt-3">
                        <a href="registro.html" class="text-warning">
                            ¿No tienes cuenta? Regístrate
                        </a>
                    </div>

                    <div class="text-center mt-3">
                        <a href="index.html" class="btn btn-danger">
                            Volver al inicio
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        function login() {

            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            const usuarioGuardado = JSON.parse(localStorage.getItem('usuario'));

            if (!usuarioGuardado) {

                alert('No existe ningún usuario registrado');
                return;

            }

            if (
                correo === usuarioGuardado.correo &&
                password === usuarioGuardado.password
            ) {

                alert('Inicio de sesión exitoso');

                window.location.href = 'index.html';

            } else {

                alert('Correo o contraseña incorrectos');

            }

        }

    </script>

</body>

</html>
